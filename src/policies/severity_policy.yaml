# ============================================================
# Severity Policy — P1 to P4 Thresholds
# ============================================================
# This file defines the rules the AI uses to assign severity levels.
# Product Managers can edit this file without touching Python code.
# The TriageAgent loads these rules and includes them in the LLM prompt.
# ============================================================

severity_levels:
  P1_Critical:
    label: "P1 (Critical)"
    description: "System down, revenue impacting, or blocks core functionality for a large user base without any workaround."
    conditions:
      - "Explicitly prevents user authentication or login."
      - "Explicitly blocks checkout, payment processing, or revenue generation."
      - "Causes verified data loss, data corruption, or severe security breach."
      - "Issue explicitly affects 100 or more users."
      - "Complete application crash, dead-lock, or wide-spread system outage."

  P2_High:
    label: "P2 (High)"
    description: "Core feature is broken but a workaround exists, or significant performance degradation."
    conditions:
      - "Core feature is broken but users have a known workaround."
      - "Issue explicitly affects between 10 and 99 users."
      - "Severe performance degradation (e.g., timeouts, 5x slower than normal)."
      - "Intermittent crashes in key business workflows."

  P3_Medium:
    label: "P3 (Medium)"
    description: "Non-core feature issue with limited user impact. This is the DEFAULT severity if user count is missing or impact is ambiguous."
    conditions:
      - "Non-core or secondary feature is broken."
      - "Issue explicitly affects fewer than 10 users."
      - "Functionality is available through an alternative path in the UI."
      - "Minor data display inconsistency with no actual data loss."

  P4_Low:
    label: "P4 (Low)"
    description: "Cosmetic, trivial, or enhancement request."
    conditions:
      - "Typographical error or visual/CSS alignment glitch."
      - "Issue exclusively affects exactly 1 user with a trivial workaround."
      - "User is explicitly requesting a new feature or enhancement."
      - "Documentation mistake or broken external link."

  Not_Applicable:
    label: "N/A (Not Related)"
    description: "Issue is not related to our project, is spam, or does not match any known bug/feature request patterns."
    conditions:
      - "Issue description is clearly for a different product or company."
      - "Content is promotional, spam, or gibberish."
      - "Request is completely out of scope for the current software project."
      - "Report is not related to the defined cases (authentication, payment, UI, etc.)."

# ============================================================
# Default: If no conditions match, assign P3 as a safe default.
# ============================================================
default_severity: "P3_Medium"

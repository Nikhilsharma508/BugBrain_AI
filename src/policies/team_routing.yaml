# ============================================================
# Team Routing Rules — Component → Team Mapping
# ============================================================
# This file maps bug report components/areas to the responsible team.
# The TriageAgent uses these rules to suggest the owning team.
# ============================================================

teams:
  Frontend-Team:
    description: "Handles UI/UX issues, browser compatibility, CSS/JS bugs. Do NOT assign here if payment or infrastructure is involved."
    priority: "Low"
    keywords:
      - "UI"
      - "frontend"
      - "CSS"
      - "JavaScript"
      - "browser"
      - "rendering"
      - "layout"
      - "responsive"
      - "button"

  Payments-Backend-Team:
    description: "Handles payment processing, transaction failures, checkout. ALWAYS prioritize this team if financial keywords are present."
    priority: "Highest"
    keywords:
      - "payment"
      - "transaction"
      - "checkout"
      - "purchase"
      - "billing"
      - "invoice"
      - "stripe"
      - "refund"

  Backend-Team:
    description: "Handles general server-side logic, API errors, database issues. Do NOT assign here if issue is specifically Payments."
    priority: "Medium"
    keywords:
      - "API"
      - "server"
      - "database"
      - "timeout"
      - "500 error"
      - "backend"
      - "query"
      - "REST"
      - "endpoint"

  Mobile-Team:
    description: "Handles iOS, iPad, and Android native app/browser issues."
    priority: "High"
    keywords:
      - "iOS"
      - "iPad"
      - "Android"
      - "mobile"
      - "app crash"
      - "native"
      - "push notification"

  DevOps-Team:
    description: "Handles infrastructure, deployment, and CI/CD issues."
    priority: "Medium"
    keywords:
      - "deployment"
      - "infrastructure"
      - "CI/CD"
      - "Docker"
      - "Kubernetes"
      - "memory leak"
      - "server down"

  Platform-Team:
    description: "DEFAULT TEAM. Handles IDE, plugin, compiler, build system issues, or any issue that does not strictly match another team."
    priority: "Lowest"
    keywords:
      - "Eclipse"
      - "compiler"
      - "build"
      - "plugin"
      - "IDE"
      - "classpath"
      - "refactoring"

  Out-of-Scope:
    description: "Handles reports that are not related to the project or are identified as spam/irrelevant."
    priority: "Lowest"
    keywords:
      - "spam"
      - "irrelevant"
      - "wrong project"
      - "advertisement"
      - "promotional"
      - "outside"
      - "not related"

# ============================================================
# Default: If no team matches, assign to the Platform-Team.
# ============================================================
default_team: "Platform-Team"
